name: Bug report
about: Report a bug in the docs hub or broken links
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Page or section
      description: URL or section name
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it?
